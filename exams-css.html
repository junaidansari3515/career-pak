<main class='section'><div class='container'><h1 class='page-title'>Exams Css</h1><p class='page-subtitle'>Latest opportunities with CMS-powered cards.</p><div id='resultsCount' class='results-count'>Loading...</div><div id='resultsGrid' class='cards-grid'></div></div></main><script>function _renderPage(){const m={'scholarships':'Scholarships','scholarships-national':'Scholarships','scholarships-international':'Scholarships','internships':'Internships','exams':'Exams','exams-css':'Exams','exams-mdcat':'Exams','exams-ppsc':'Exams','jobs-government':'Jobs','jobs-private':'Jobs'};const key='exams-css';let items=(window.CMS_DATA[m[key]]||[]).slice();if(key==='scholarships-national')items=items.filter(i=>scholarshipMatchesCountry(i,'Pakistan'));if(key==='scholarships-international')items=items.filter(i=>scholarshipMatchesCountry(i,'International'));if(key==='exams-css')items=items.filter(i=>/css/i.test((i.exam_type||'')+' '+(i.tags||'')));if(key==='exams-mdcat')items=items.filter(i=>/mdcat/i.test((i.exam_type||'')+' '+(i.tags||'')));if(key==='exams-ppsc')items=items.filter(i=>/ppsc/i.test((i.exam_type||'')+' '+(i.tags||'')));if(key==='jobs-government')items=items.filter(i=>isGovernmentType(i.type)||/government/i.test(i.category||''));if(key==='jobs-private')items=items.filter(i=>!isGovernmentType(i.type));items=sortItems(items,'newest');resultsCount.textContent=items.length+' results';resultsGrid.innerHTML=items.map(i=>m[key]==='Jobs'?cardJob(i):m[key]==='Scholarships'?cardScholarship(i):m[key]==='Internships'?cardInternship(i):cardExam(i)).join('');}document.addEventListener('DOMContentLoaded',()=>onCMSReady(_renderPage));</script>
